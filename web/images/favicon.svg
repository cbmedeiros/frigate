<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1400" height="512" viewBox="0 0 1400 512"
     style="overflow:visible">
  <title>SUPA View (vector, padded)</title>

  <!-- Safe padding background (transparent) -->
  <rect width="1400" height="512" fill="none"/>

  <!-- "SUPA" -->
  <text x="64" y="340"
        font-family="DejaVu Sans, Segoe UI, Arial, Helvetica, sans-serif"
        font-weight="800"
        font-size="280"
        fill="#1A66CC">SUPA</text>

  <!-- "View" with more left margin and slightly larger size for legibility -->
  <text x="920" y="300"
        font-family="DejaVu Sans, Segoe UI, Arial, Helvetica, sans-serif"
        font-weight="700"
        font-size="140"
        letter-spacing="1"
        fill="#1A66CC">View</text>
</svg>
