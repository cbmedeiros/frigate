name: Build and Push Custom Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag for the Docker image'
        required: true
        default: 'latest'
        type: string
      push_to_registry:
        description: 'Push to Docker registry'
        required: true
        default: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to Docker Hub
        if: ${{ inputs.push_to_registry }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Log in to GitHub Container Registry
        if: ${{ inputs.push_to_registry }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Generate version file
        run: |
          COMMIT_HASH=$(git log -1 --pretty=format:"%h"|tail -1)
          VERSION="0.17.0"
          echo "VERSION = \"${VERSION}-${COMMIT_HASH}\"" > frigate/version.py
          
      - name: Build and push to Docker Hub
        if: ${{ inputs.push_to_registry }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/main/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          target: frigate
          tags: |
            ${{ github.repository_owner }}/frigate:${{ inputs.tag }}
            ${{ github.repository_owner }}/frigate:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: Build and push to GitHub Container Registry
        if: ${{ inputs.push_to_registry }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/main/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          target: frigate
          tags: |
            ghcr.io/${{ github.repository }}:${{ inputs.tag }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: Build only (no push)
        if: ${{ !inputs.push_to_registry }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/main/Dockerfile
          push: false
          platforms: linux/amd64
          target: frigate
          tags: frigate:${{ inputs.tag }}